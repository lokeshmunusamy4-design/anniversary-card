<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Anniversary 💖</title><style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.card {
    width: 320px;
    height: 480px;
    background: white;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    overflow: hidden;
    animation: fadeIn 2s ease-in-out;
}

.card img {
    width: 100%;
    height: 260px;
    object-fit: cover;
}

h2 {
    color: #ff4d6d;
}

p {
    padding: 10px;
    font-size: 14px;
}

button {
    background: #ff4d6d;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 20px;
    cursor: pointer;
}

/* Floating Hearts */
.heart {
    position: fixed;
    color: red;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {transform: translateY(0); opacity:1;}
    100% {transform: translateY(-800px); opacity:0;}
}

@keyframes fadeIn {
    from {opacity: 0; transform: scale(0.8);}
    to {opacity: 1; transform: scale(1);}
}
</style></head><body><div class="card">
    <!-- ✅ YOUR IMAGE ADDED -->
    <img src="https://i.ibb.co/gM3cVJrz/your-image.jpg" alt="Couple"><h2>Happy Anniversary 💖</h2>

<p>
    Dear Selva Mama & Raji Akka 💕<br><br>
    Wishing you both a lifetime of love, happiness and togetherness ❤️  
    May your bond grow stronger every day 💫
</p>

<button onclick="startSurprise()">Open Surprise 🎁</button>

</div><!-- 🎵 Music --><audio id="music">
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio><script>
function startSurprise() {
    document.getElementById("music").play();

    for (let i = 0; i < 25; i++) {
        let heart = document.createElement("div");
        heart.innerHTML = "❤️";
        heart.className = "heart";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 20 + 20 + "px";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }

    alert("💖 Happy Anniversary Selva Mama & Raji Akka 💖");
}
</script></body>
</html>
